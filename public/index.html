<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BookStore</title>
  <style>
    /* ── Reset & Base ──────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #eaeded; color: #0f1111; font-size: 14px; }
    a { text-decoration: none; color: inherit; cursor: pointer; }
    button { cursor: pointer; border: none; }
    input, select { font-size: 14px; }

    /* ── Navbar ────────────────────────────────────────────────────────────── */
    #navbar {
      background: #131921;
      color: #fff;
      display: flex;
      align-items: center;
      padding: 8px 16px;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    #navbar .logo {
      font-size: 22px;
      font-weight: bold;
      color: #ff9900;
      white-space: nowrap;
      padding: 4px 8px;
      border: 1px solid transparent;
      border-radius: 2px;
    }
    #navbar .logo:hover { border-color: #fff; }
    #search-bar {
      flex: 1;
      display: flex;
      min-width: 0;
    }
    #search-input {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 4px 0 0 4px;
      font-size: 15px;
      outline: none;
    }
    #search-btn {
      background: #febd69;
      padding: 0 16px;
      border-radius: 0 4px 4px 0;
      font-size: 18px;
      transition: background .15s;
    }
    #search-btn:hover { background: #f3a847; }
    .nav-btn {
      background: none;
      color: #fff;
      padding: 6px 10px;
      border-radius: 3px;
      border: 1px solid transparent;
      white-space: nowrap;
      line-height: 1.3;
    }
    .nav-btn:hover { border-color: #fff; }
    .nav-btn .small { font-size: 11px; color: #ccc; display: block; }
    .nav-btn .big  { font-size: 14px; font-weight: bold; display: block; }
    #cart-btn { display: flex; align-items: center; gap: 4px; }
    #cart-count {
      background: #f3a847;
      color: #131921;
      border-radius: 50%;
      padding: 1px 6px;
      font-size: 13px;
      font-weight: bold;
      min-width: 20px;
      text-align: center;
    }

    /* ── Sub-navbar ────────────────────────────────────────────────────────── */
    #subnav {
      background: #232f3e;
      color: #fff;
      padding: 6px 16px;
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .subnav-item {
      padding: 5px 10px;
      border-radius: 2px;
      border: 1px solid transparent;
      font-size: 13px;
      cursor: pointer;
    }
    .subnav-item:hover { border-color: #fff; }
    .subnav-item.active { border-color: #fff; }

    /* ── Banner ────────────────────────────────────────────────────────────── */
    #banner {
      background: linear-gradient(135deg, #232f3e 0%, #37475a 100%);
      color: #fff;
      text-align: center;
      padding: 36px 20px;
    }
    #banner h1 { font-size: 28px; margin-bottom: 8px; color: #febd69; }
    #banner p  { font-size: 15px; color: #ddd; }

    /* ── Layout ────────────────────────────────────────────────────────────── */
    #page { max-width: 1400px; margin: 0 auto; padding: 16px; }

    /* ── Filter sidebar ────────────────────────────────────────────────────── */
    #layout { display: flex; gap: 16px; align-items: flex-start; }
    #sidebar {
      width: 220px;
      flex-shrink: 0;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 16px;
    }
    #sidebar h3 { font-size: 16px; margin-bottom: 12px; border-bottom: 1px solid #ddd; padding-bottom: 8px; }
    .filter-group { margin-bottom: 14px; }
    .filter-group label { display: block; font-weight: bold; margin-bottom: 6px; font-size: 13px; }
    .filter-group input, .filter-group select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #a6a6a6;
      border-radius: 3px;
    }
    .filter-row { display: flex; gap: 6px; }
    .filter-row input { width: 50%; }
    #apply-filters {
      width: 100%;
      background: #febd69;
      padding: 8px;
      border-radius: 3px;
      font-weight: bold;
      border: 1px solid #a88734;
      margin-top: 4px;
    }
    #apply-filters:hover { background: #f3a847; }

    /* ── Book grid ─────────────────────────────────────────────────────────── */
    #main { flex: 1; min-width: 0; }
    #results-info { font-size: 13px; color: #555; margin-bottom: 12px; }
    #book-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }
    .book-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      transition: box-shadow .2s;
    }
    .book-card:hover { box-shadow: 0 2px 10px rgba(0,0,0,.15); }
    .book-cover {
      width: 100%;
      height: 160px;
      background: linear-gradient(135deg, #232f3e, #37475a);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
      color: #febd69;
      font-size: 36px;
    }
    .book-title { font-size: 14px; font-weight: bold; margin-bottom: 4px; line-height: 1.3; }
    .book-author { font-size: 12px; color: #555; margin-bottom: 4px; }
    .book-genre {
      font-size: 11px;
      background: #f0f2f2;
      display: inline-block;
      padding: 2px 6px;
      border-radius: 3px;
      margin-bottom: 8px;
      color: #555;
    }
    .book-price { font-size: 18px; font-weight: bold; color: #b12704; margin-bottom: 2px; }
    .book-stock { font-size: 11px; color: #007600; margin-bottom: 10px; }
    .book-stock.out { color: #b12704; }
    .add-to-cart-btn {
      margin-top: auto;
      background: #febd69;
      border: 1px solid #a88734;
      border-radius: 20px;
      padding: 7px 12px;
      font-size: 13px;
      font-weight: bold;
      transition: background .15s;
    }
    .add-to-cart-btn:hover { background: #f3a847; }
    .add-to-cart-btn:disabled { background: #e7e9ec; border-color: #adb1b8; color: #888; cursor: default; }

    /* ── Pagination ────────────────────────────────────────────────────────── */
    #pagination { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 24px; }
    .page-btn {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 3px;
      padding: 6px 12px;
      font-size: 13px;
    }
    .page-btn:hover:not(:disabled) { background: #f7f8f9; border-color: #a6a6a6; }
    .page-btn:disabled { color: #aaa; cursor: default; }
    .page-btn.current { background: #febd69; border-color: #a88734; font-weight: bold; }
    #page-info { font-size: 13px; color: #555; }

    /* ── Modal overlay ─────────────────────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 6px;
      padding: 28px 32px;
      width: 100%;
      max-width: 420px;
      position: relative;
    }
    .modal h2 { font-size: 22px; margin-bottom: 20px; }
    .modal-close {
      position: absolute;
      top: 12px; right: 16px;
      background: none;
      font-size: 22px;
      color: #555;
    }
    .modal-close:hover { color: #000; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 13px; }
    .form-group input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #a6a6a6;
      border-radius: 3px;
      font-size: 14px;
    }
    .form-group input:focus { outline: none; border-color: #e77600; box-shadow: 0 0 0 3px rgba(228,121,17,.25); }
    .form-error { color: #b12704; font-size: 12px; margin-top: 4px; }
    .form-submit {
      width: 100%;
      background: #febd69;
      border: 1px solid #a88734;
      border-radius: 3px;
      padding: 10px;
      font-size: 15px;
      font-weight: bold;
      margin-top: 6px;
    }
    .form-submit:hover { background: #f3a847; }
    .modal-switch { text-align: center; margin-top: 14px; font-size: 13px; color: #555; }
    .modal-switch a { color: #0066c0; }
    .modal-switch a:hover { text-decoration: underline; color: #c45500; }

    /* ── Cart sidebar ──────────────────────────────────────────────────────── */
    #cart-panel {
      display: none;
      position: fixed;
      top: 0; right: 0;
      width: 380px;
      max-width: 100vw;
      height: 100vh;
      background: #fff;
      box-shadow: -4px 0 20px rgba(0,0,0,.2);
      z-index: 300;
      flex-direction: column;
    }
    #cart-panel.open { display: flex; }
    #cart-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.4);
      z-index: 299;
    }
    #cart-overlay.open { display: block; }
    #cart-header {
      background: #232f3e;
      color: #fff;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #cart-header h2 { font-size: 18px; }
    #cart-close { background: none; color: #fff; font-size: 22px; }
    #cart-items { flex: 1; overflow-y: auto; padding: 16px; }
    .cart-item {
      display: flex;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #eee;
      align-items: flex-start;
    }
    .cart-item-icon {
      width: 50px;
      height: 60px;
      background: linear-gradient(135deg, #232f3e, #37475a);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #febd69;
      font-size: 20px;
      flex-shrink: 0;
    }
    .cart-item-info { flex: 1; min-width: 0; }
    .cart-item-title { font-weight: bold; font-size: 13px; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cart-item-price { color: #b12704; font-size: 13px; margin-bottom: 6px; }
    .cart-item-qty { display: flex; align-items: center; gap: 8px; }
    .qty-btn {
      width: 26px;
      height: 26px;
      background: #f0f2f2;
      border: 1px solid #adb1b8;
      border-radius: 3px;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }
    .qty-btn:hover { background: #e7e9ec; }
    .qty-display { font-weight: bold; font-size: 14px; min-width: 24px; text-align: center; }
    .remove-item-btn { font-size: 11px; color: #0066c0; cursor: pointer; margin-left: auto; }
    .remove-item-btn:hover { text-decoration: underline; color: #c45500; }
    #cart-empty { color: #555; text-align: center; padding: 40px 0; }
    #cart-footer {
      padding: 16px;
      border-top: 1px solid #eee;
      background: #f7f8f9;
    }
    #cart-total { font-size: 16px; font-weight: bold; margin-bottom: 12px; }
    #checkout-btn {
      width: 100%;
      background: #febd69;
      border: 1px solid #a88734;
      border-radius: 20px;
      padding: 11px;
      font-size: 15px;
      font-weight: bold;
    }
    #checkout-btn:hover { background: #f3a847; }
    #checkout-btn:disabled { background: #e7e9ec; border-color: #adb1b8; color: #888; }

    /* ── Toast ─────────────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      background: #232f3e;
      color: #fff;
      padding: 12px 24px;
      border-radius: 4px;
      font-size: 14px;
      z-index: 500;
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; }
    #toast.success { background: #067d62; }
    #toast.error   { background: #b12704; }

    /* ── Orders page ───────────────────────────────────────────────────────── */
    #orders-section { display: none; }
    .order-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .order-card-header {
      background: #f7f8f9;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #ddd;
      flex-wrap: wrap;
      gap: 8px;
    }
    .order-card-header .label { font-size: 11px; color: #555; }
    .order-card-header .value { font-weight: bold; font-size: 13px; }
    .order-status {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: bold;
    }
    .order-status.pending   { background: #fff3cd; color: #856404; }
    .order-status.confirmed { background: #d1e7dd; color: #0a3622; }
    .order-status.shipped   { background: #cfe2ff; color: #084298; }
    .order-status.cancelled { background: #f8d7da; color: #842029; }
    .order-items-list { padding: 12px 16px; }
    .order-item-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; border-bottom: 1px solid #f0f2f2; }
    .order-item-row:last-child { border-bottom: none; }
    .order-cancel-btn {
      margin: 8px 16px 12px;
      background: none;
      border: 1px solid #adb1b8;
      border-radius: 3px;
      padding: 5px 12px;
      font-size: 12px;
      color: #b12704;
    }
    .order-cancel-btn:hover { background: #fff3f3; border-color: #b12704; }

    /* ── Responsive ────────────────────────────────────────────────────────── */
    @media (max-width: 700px) {
      #sidebar { display: none; }
      #banner h1 { font-size: 20px; }
      #cart-panel { width: 100vw; }
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav id="navbar">
  <div class="logo" onclick="showShop()">📚 BookStore</div>
  <div id="search-bar">
    <input id="search-input" type="text" placeholder="Search books by title, author, genre…" />
    <button id="search-btn" onclick="doSearch()">🔍</button>
  </div>
  <button class="nav-btn" id="account-btn" onclick="toggleAccountMenu()">
    <span class="small" id="account-greeting">Hello, sign in</span>
    <span class="big">Account ▾</span>
  </button>
  <button class="nav-btn" onclick="showOrders()">
    <span class="small">Returns &amp;</span>
    <span class="big">Orders</span>
  </button>
  <button class="nav-btn" id="cart-btn" onclick="openCart()">
    🛒 Cart <span id="cart-count">0</span>
  </button>
</nav>

<!-- Sub-navbar genres -->
<div id="subnav">
  <div class="subnav-item active" onclick="filterGenre('')">All</div>
  <div class="subnav-item" onclick="filterGenre('Fiction')">Fiction</div>
  <div class="subnav-item" onclick="filterGenre('Science Fiction')">Sci-Fi</div>
  <div class="subnav-item" onclick="filterGenre('Mystery')">Mystery</div>
  <div class="subnav-item" onclick="filterGenre('Fantasy')">Fantasy</div>
  <div class="subnav-item" onclick="filterGenre('Non-Fiction')">Non-Fiction</div>
  <div class="subnav-item" onclick="filterGenre('Biography')">Biography</div>
  <div class="subnav-item" onclick="filterGenre('History')">History</div>
</div>

<!-- Banner -->
<div id="banner">
  <h1>Millions of Books, Delivered to You</h1>
  <p>Discover your next favourite read</p>
</div>

<!-- Main page -->
<div id="page">
  <!-- Shop section -->
  <div id="shop-section">
    <div id="layout">
      <!-- Sidebar filters -->
      <div id="sidebar">
        <h3>Filter Books</h3>
        <div class="filter-group">
          <label>Author</label>
          <input id="f-author" type="text" placeholder="e.g. Tolkien" />
        </div>
        <div class="filter-group">
          <label>Genre</label>
          <input id="f-genre" type="text" placeholder="e.g. Fantasy" />
        </div>
        <div class="filter-group">
          <label>Price Range ($)</label>
          <div class="filter-row">
            <input id="f-min" type="number" placeholder="Min" min="0" step="0.01" />
            <input id="f-max" type="number" placeholder="Max" min="0" step="0.01" />
          </div>
        </div>
        <button id="apply-filters" onclick="applyFilters()">Apply Filters</button>
      </div>

      <!-- Book grid -->
      <div id="main">
        <div id="results-info"></div>
        <div id="book-grid"></div>
        <div id="pagination"></div>
      </div>
    </div>
  </div>

  <!-- Orders section -->
  <div id="orders-section">
    <h2 style="margin-bottom:16px">Your Orders</h2>
    <div id="orders-list"></div>
  </div>
</div>

<!-- Cart slide-out -->
<div id="cart-overlay" onclick="closeCart()"></div>
<div id="cart-panel">
  <div id="cart-header">
    <h2>🛒 Shopping Cart</h2>
    <button id="cart-close" onclick="closeCart()">✕</button>
  </div>
  <div id="cart-items"></div>
  <div id="cart-footer">
    <div id="cart-total"></div>
    <button id="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
  </div>
</div>

<!-- Auth modal -->
<div class="modal-overlay" id="auth-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeAuth()">✕</button>
    <h2 id="auth-title">Sign In</h2>
    <div id="auth-form-login">
      <div class="form-group">
        <label>Email</label>
        <input id="login-email" type="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="login-password" type="password" placeholder="••••••••" />
      </div>
      <div class="form-error" id="login-error"></div>
      <button class="form-submit" onclick="doLogin()">Sign In</button>
      <div class="modal-switch">New here? <a onclick="switchToRegister()">Create account</a></div>
    </div>
    <div id="auth-form-register" style="display:none">
      <div class="form-group">
        <label>Name</label>
        <input id="reg-name" type="text" placeholder="Your name" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input id="reg-email" type="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="reg-password" type="password" placeholder="At least 6 characters" />
      </div>
      <div class="form-error" id="reg-error"></div>
      <button class="form-submit" onclick="doRegister()">Create Account</button>
      <div class="modal-switch">Already have an account? <a onclick="switchToLogin()">Sign in</a></div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  // ── State ───────────────────────────────────────────────────────────────────
  let token = localStorage.getItem('bs_token') || null;
  let currentUser = JSON.parse(localStorage.getItem('bs_user') || 'null');
  let cart = { items: [] };
  let currentPage = 1;
  let currentFilters = {};
  const PAGE_SIZE = 12;

  // ── API helpers ─────────────────────────────────────────────────────────────
  async function api(method, path, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (token) opts.headers['Authorization'] = 'Bearer ' + token;
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch('/api' + path, opts);
    const data = await res.json().catch(() => ({}));
    return { ok: res.ok, status: res.status, data };
  }

  // ── Toast ───────────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show' + (type ? ' ' + type : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 2800);
  }

  // ── Auth ────────────────────────────────────────────────────────────────────
  function updateNavUser() {
    const el = document.getElementById('account-greeting');
    el.textContent = currentUser ? `Hello, ${currentUser.name}` : 'Hello, sign in';
  }

  function toggleAccountMenu() {
    if (currentUser) {
      token = null; currentUser = null;
      localStorage.removeItem('bs_token');
      localStorage.removeItem('bs_user');
      cart = { items: [] };
      updateNavUser();
      updateCartCount();
      showToast('Signed out');
    } else {
      openAuth('login');
    }
  }

  function openAuth(mode) {
    document.getElementById('auth-modal').classList.add('open');
    if (mode === 'register') switchToRegister(); else switchToLogin();
  }
  function closeAuth() { document.getElementById('auth-modal').classList.remove('open'); }
  function switchToLogin() {
    document.getElementById('auth-title').textContent = 'Sign In';
    document.getElementById('auth-form-login').style.display = '';
    document.getElementById('auth-form-register').style.display = 'none';
    document.getElementById('login-error').textContent = '';
  }
  function switchToRegister() {
    document.getElementById('auth-title').textContent = 'Create Account';
    document.getElementById('auth-form-login').style.display = 'none';
    document.getElementById('auth-form-register').style.display = '';
    document.getElementById('reg-error').textContent = '';
  }

  async function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const { ok, data } = await api('POST', '/auth/login', { email, password });
    if (!ok) { document.getElementById('login-error').textContent = data.error || 'Login failed'; return; }
    token = data.token;
    currentUser = data.user;
    localStorage.setItem('bs_token', token);
    localStorage.setItem('bs_user', JSON.stringify(currentUser));
    updateNavUser();
    closeAuth();
    showToast(`Welcome back, ${currentUser.name}!`, 'success');
    await loadCart();
  }

  async function doRegister() {
    const name     = document.getElementById('reg-name').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const { ok, data } = await api('POST', '/auth/register', { name, email, password });
    if (!ok) {
      const msg = Array.isArray(data.error) ? data.error.map(e => e.message).join(', ') : (data.error || 'Registration failed');
      document.getElementById('reg-error').textContent = msg;
      return;
    }
    showToast('Account created! Please sign in.', 'success');
    switchToLogin();
    document.getElementById('login-email').value = email;
  }

  // ── Books ───────────────────────────────────────────────────────────────────
  function doSearch() {
    const q = document.getElementById('search-input').value.trim();
    currentFilters = q ? { title: q } : {};
    currentPage = 1;
    loadBooks();
  }

  function filterGenre(genre) {
    document.querySelectorAll('.subnav-item').forEach(el => el.classList.remove('active'));
    event.target.classList.add('active');
    currentFilters = genre ? { genre } : {};
    document.getElementById('search-input').value = '';
    currentPage = 1;
    loadBooks();
  }

  function applyFilters() {
    const author = document.getElementById('f-author').value.trim();
    const genre  = document.getElementById('f-genre').value.trim();
    const min    = document.getElementById('f-min').value;
    const max    = document.getElementById('f-max').value;
    currentFilters = {};
    if (author) currentFilters.author = author;
    if (genre)  currentFilters.genre  = genre;
    if (min)    currentFilters.minPrice = min;
    if (max)    currentFilters.maxPrice = max;
    currentPage = 1;
    loadBooks();
  }

  async function loadBooks() {
    const params = new URLSearchParams({ page: currentPage, limit: PAGE_SIZE, ...currentFilters });
    const { ok, data } = await api('GET', '/books?' + params);
    if (!ok) { showToast('Failed to load books', 'error'); return; }

    const grid = document.getElementById('book-grid');
    const info = document.getElementById('results-info');

    if (!data.data.length) {
      grid.innerHTML = '<p style="color:#555;padding:32px 0">No books found matching your search.</p>';
      info.textContent = '';
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    info.textContent = `Showing ${data.data.length} of ${data.total} result${data.total !== 1 ? 's' : ''}`;

    grid.innerHTML = data.data.map(b => `
      <div class="book-card">
        <div class="book-cover">📖</div>
        <div class="book-title">${esc(b.title)}</div>
        <div class="book-author">${esc(b.author)}</div>
        <div class="book-genre">${esc(b.genre)}</div>
        <div class="book-price">$${b.price.toFixed(2)}</div>
        <div class="book-stock ${b.stock === 0 ? 'out' : ''}">${b.stock > 0 ? 'In Stock (' + b.stock + ')' : 'Out of Stock'}</div>
        <button class="add-to-cart-btn" onclick="addToCart('${b.id}')" ${b.stock === 0 ? 'disabled' : ''}>
          Add to Cart
        </button>
      </div>`).join('');

    renderPagination(data.total, data.page, data.limit);
  }

  function renderPagination(total, page, limit) {
    const totalPages = Math.ceil(total / limit);
    const pg = document.getElementById('pagination');
    if (totalPages <= 1) { pg.innerHTML = ''; return; }
    let html = `<button class="page-btn" onclick="goPage(${page-1})" ${page<=1?'disabled':''}>← Prev</button>`;
    const start = Math.max(1, page-2), end = Math.min(totalPages, page+2);
    for (let i = start; i <= end; i++) {
      html += `<button class="page-btn ${i===page?'current':''}" onclick="goPage(${i})">${i}</button>`;
    }
    html += `<button class="page-btn" onclick="goPage(${page+1})" ${page>=totalPages?'disabled':''}>Next →</button>`;
    html += `<span id="page-info">Page ${page} of ${totalPages}</span>`;
    pg.innerHTML = html;
  }

  function goPage(p) { currentPage = p; loadBooks(); window.scrollTo(0,0); }

  // ── Cart ────────────────────────────────────────────────────────────────────
  async function loadCart() {
    if (!token) return;
    const { ok, data } = await api('GET', '/cart');
    if (ok) { cart = data; updateCartCount(); }
  }

  function updateCartCount() {
    const total = cart.items.reduce((s, i) => s + i.quantity, 0);
    document.getElementById('cart-count').textContent = total;
  }

  async function addToCart(bookId) {
    if (!token) { openAuth('login'); showToast('Please sign in to add to cart'); return; }
    const { ok, data } = await api('POST', '/cart/items', { bookId, quantity: 1 });
    if (!ok) { showToast((data.error || 'Could not add to cart'), 'error'); return; }
    cart = data;
    updateCartCount();
    showToast('Added to cart!', 'success');
  }

  async function updateQty(bookId, delta) {
    const item = cart.items.find(i => i.bookId === bookId);
    if (!item) return;
    const newQty = item.quantity + delta;
    const { ok, data } = await api('PATCH', '/cart/items/' + bookId, { quantity: Math.max(0, newQty) });
    if (!ok) { showToast(data.error || 'Error', 'error'); return; }
    cart = data;
    updateCartCount();
    renderCartItems();
  }

  async function removeFromCart(bookId) {
    const { ok, data } = await api('PATCH', '/cart/items/' + bookId, { quantity: 0 });
    if (!ok) { showToast('Error removing item', 'error'); return; }
    cart = data;
    updateCartCount();
    renderCartItems();
  }

  function renderCartItems() {
    const el = document.getElementById('cart-items');
    if (!cart.items.length) {
      el.innerHTML = '<p id="cart-empty">Your cart is empty.</p>';
      document.getElementById('cart-total').textContent = '';
      document.getElementById('checkout-btn').disabled = true;
      return;
    }
    document.getElementById('checkout-btn').disabled = false;
    const total = cart.items.reduce((s, i) => s + i.priceAtAdd * i.quantity, 0);
    el.innerHTML = cart.items.map(i => `
      <div class="cart-item">
        <div class="cart-item-icon">📖</div>
        <div class="cart-item-info">
          <div class="cart-item-title">${esc(i.title || i.bookId)}</div>
          <div class="cart-item-price">$${i.priceAtAdd.toFixed(2)} each</div>
          <div class="cart-item-qty">
            <button class="qty-btn" onclick="updateQty('${i.bookId}', -1)">−</button>
            <span class="qty-display">${i.quantity}</span>
            <button class="qty-btn" onclick="updateQty('${i.bookId}', 1)">+</button>
            <span class="remove-item-btn" onclick="removeFromCart('${i.bookId}')">Remove</span>
          </div>
        </div>
      </div>`).join('');
    document.getElementById('cart-total').innerHTML = `<strong>Subtotal (${cart.items.reduce((s,i)=>s+i.quantity,0)} items):</strong> $${total.toFixed(2)}`;
  }

  function openCart() {
    renderCartItems();
    document.getElementById('cart-panel').classList.add('open');
    document.getElementById('cart-overlay').classList.add('open');
  }
  function closeCart() {
    document.getElementById('cart-panel').classList.remove('open');
    document.getElementById('cart-overlay').classList.remove('open');
  }

  async function checkout() {
    if (!token) { openAuth('login'); closeCart(); return; }
    const { ok, data } = await api('POST', '/orders');
    if (!ok) { showToast(data.error || 'Checkout failed', 'error'); return; }
    cart = { items: [] };
    updateCartCount();
    closeCart();
    showToast('Order placed! 🎉', 'success');
    loadBooks(); // refresh stock
  }

  // ── Orders ──────────────────────────────────────────────────────────────────
  async function showOrders() {
    if (!token) { openAuth('login'); return; }
    document.getElementById('shop-section').style.display = 'none';
    document.getElementById('orders-section').style.display = 'block';
    const { ok, data } = await api('GET', '/orders');
    const el = document.getElementById('orders-list');
    if (!ok || !data.length) { el.innerHTML = '<p style="color:#555">No orders yet.</p>'; return; }
    el.innerHTML = data.map(o => `
      <div class="order-card">
        <div class="order-card-header">
          <div><div class="label">ORDER PLACED</div><div class="value">${new Date(o.createdAt).toLocaleDateString()}</div></div>
          <div><div class="label">TOTAL</div><div class="value">$${o.totalAmount.toFixed(2)}</div></div>
          <div><div class="label">ORDER ID</div><div class="value" style="font-size:11px">${o.id}</div></div>
          <span class="order-status ${o.status}">${o.status.toUpperCase()}</span>
        </div>
        <div class="order-items-list">
          ${o.items.map(i => `<div class="order-item-row"><span>${esc(i.title)} × ${i.quantity}</span><span>$${(i.priceAtOrder * i.quantity).toFixed(2)}</span></div>`).join('')}
        </div>
        ${o.status === 'pending' ? `<button class="order-cancel-btn" onclick="cancelOrder('${o.id}')">Cancel Order</button>` : ''}
      </div>`).join('');
  }

  async function cancelOrder(id) {
    const { ok, data } = await api('PATCH', '/orders/' + id + '/cancel');
    if (!ok) { showToast(data.error || 'Could not cancel', 'error'); return; }
    showToast('Order cancelled', 'success');
    showOrders();
  }

  function showShop() {
    document.getElementById('shop-section').style.display = '';
    document.getElementById('orders-section').style.display = 'none';
  }

  // ── Utilities ───────────────────────────────────────────────────────────────
  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Keyboard ────────────────────────────────────────────────────────────────
  document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

  // ── Boot ────────────────────────────────────────────────────────────────────
  updateNavUser();
  loadBooks();
  if (token) loadCart();
</script>
</body>
</html>
