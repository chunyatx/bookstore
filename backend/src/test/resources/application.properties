server.port=8080

# ── H2 in-memory (Oracle compatibility mode) for tests ───────────────────────
spring.datasource.url=jdbc:h2:mem:testdb;MODE=Oracle;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=change-me-in-production-use-at-least-32-chars-long-secret
app.jwt.expiration-ms=604800000

# ── SpringDoc / Swagger ───────────────────────────────────────────────────────
springdoc.swagger-ui.path=/docs
springdoc.api-docs.path=/api-docs
