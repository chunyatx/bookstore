server.port=8080

# ── Oracle DataSource ─────────────────────────────────────────────────────────
# Default credentials for gvenzl/oracle-xe Docker image (ORACLE_PASSWORD=oracle).
# Update these to match your actual DB user/password if different.
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
spring.datasource.username=bookstore
spring.datasource.password=bookstore123
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
# 'update' creates tables on first run and keeps them on subsequent runs
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=change-me-in-production-use-at-least-32-chars-long-secret
app.jwt.expiration-ms=604800000

# ── SpringDoc / Swagger ───────────────────────────────────────────────────────
springdoc.swagger-ui.path=/docs
springdoc.api-docs.path=/api-docs
